<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gallery - Prince Electricals</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <style>
    /* GALLERY SAME SIZE */
    .gallery-img {
        height: 250px;
        width: 100%;
        object-fit: cover;
        border-radius: 10px;
        transition: 0.3s;
    }

    .gallery-img:hover {
        transform: scale(1.05);
    }
  </style>
</head>

<!-- FULL SCREEN IMAGE VIEW -->
<div id="lightbox" onclick="closeImage()"
style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); justify-content:center; align-items:center;">

  <img id="lightbox-img" style="max-width:90%; max-height:90%; border-radius:10px;">
</div>

<script>
function openImage(img) {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = img.src;
}

function closeImage() {
  document.getElementById("lightbox").style.display = "none";
}
</script>

<body>

<div class="container py-5">
  <h1 class="text-center mb-5">Our Shop Gallery 📸</h1>

  <div class="row">

    <div class="col-md-4 mb-4">
      <img src="images/shop.jpg" class="img-fluid gallery-img" onclick="openImage(this)">
    </div>

    <div class="col-md-4 mb-4">
      <img src="images/img9.jpeg" class="img-fluid gallery-img" onclick="openImage(this)">
    </div>

    <div class="col-md-4 mb-4">
      <img src="images/img13.jpeg" class="img-fluid gallery-img" onclick="openImage(this)">
    </div>

    <div class="col-md-4 mb-4">
      <img src="images/img8.jpeg" class="img-fluid gallery-img" onclick="openImage(this)">
    </div>

    <div class="col-md-4 mb-4">
      <img src="images/img11.jpeg" class="img-fluid gallery-img" onclick="openImage(this)">
    </div>

    <div class="col-md-4 mb-4">
      <img src="images/img2.jpeg" class="img-fluid gallery-img" onclick="openImage(this)">
    </div>

    <div class="col-md-4 mb-4">
      <img src="images/img6.jpeg" class="img-fluid gallery-img" onclick="openImage(this)">
    </div>

    <div class="col-md-4 mb-4">
      <img src="images/img5.jpeg" class="img-fluid gallery-img" onclick="openImage(this)">
    </div>

    <div class="col-md-4 mb-4">
      <img src="images/img1.jpeg" class="img-fluid gallery-img" onclick="openImage(this)">
    </div>

  </div>

  <div class="text-center mt-4">
    <a href="index.html" class="btn btn-dark">⬅ Back to Home</a>
  </div>
</div>

</body>
</html>
